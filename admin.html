<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSupply Scan – Licence Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
  :root{--bg:#f5f5f5;--surface:#fff;--border:#e8e8e8;--pink:#ec4899;--pink-dim:rgba(236,72,153,.1);--green:#16a34a;--red:#dc2626;--yellow:#d97706;--text:#0a0a0a;--text-dim:#6b7280;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:var(--sans);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:16px;font-weight:700}.logo span{color:var(--pink)}
  .admin-badge{font-family:var(--mono);font-size:10px;background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink);padding:3px 10px;border-radius:4px;letter-spacing:.1em}
  #login-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:100}
  #login-screen.hidden{display:none}
  .login-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:40px;width:360px;display:flex;flex-direction:column;gap:18px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
  .login-box h2{font-size:18px;font-weight:700}.login-box h2 span{color:var(--pink)}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
  .field input{background:#f9f9f9;border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--pink)}
  .err{font-family:var(--mono);font-size:11px;color:var(--red);min-height:16px}
  .btn-primary{background:var(--text);color:#fff;border:none;border-radius:7px;padding:11px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-primary:hover{opacity:.8}
  .btn-pink{background:var(--pink);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-pink:hover{opacity:.85}
  .btn-sm{background:none;border:1.5px solid var(--border);color:var(--text-dim);border-radius:5px;padding:3px 10px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .2s}
  .btn-sm:hover{border-color:var(--pink);color:var(--pink)}
  .btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
  main{max-width:1100px;margin:0 auto;padding:32px 24px}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
  .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px}
  .stat-val{font-family:var(--mono);font-size:26px;font-weight:700}
  .stat-lbl{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .table-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:32px}
  table{width:100%;border-collapse:collapse}
  thead{background:#fdf0f7}
  th{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1.5px solid var(--border)}
  td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fdf8fc}
  .badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .badge-pro{background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.25)}
  .badge-trial{background:rgba(217,119,6,.1);color:var(--yellow);border:1px solid rgba(217,119,6,.25)}
  .badge-enterprise{background:var(--pink-dim);color:var(--pink);border:1px solid rgba(236,72,153,.3)}
  .badge-active{background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.25)}
  .badge-suspended{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.25)}
  .badge-expired{background:rgba(217,119,6,.1);color:var(--yellow);border:1px solid rgba(217,119,6,.25)}
  .key-display{font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:var(--pink)}
  /* Modal */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:50}
  #modal.hidden{display:none}
  .modal-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:28px 32px;width:460px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
  .modal-title{font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-dim)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}
  .btn-cancel{background:#f9f9f9;color:var(--text-dim);border:1.5px solid var(--border);border-radius:7px;padding:8px 16px;font-family:var(--mono);font-size:12px;cursor:pointer}
  #toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1.5px solid var(--green);color:var(--green);font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
  #toast.show{opacity:1}
  .new-key-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:16px;text-align:center}
  .new-key-val{font-family:var(--mono);font-size:18px;font-weight:700;color:#15803d;letter-spacing:.08em;margin:8px 0}
  .new-key-hint{font-size:11px;color:var(--text-dim)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>iSupply <span>Scan</span></h2>
    <p style="font-size:13px;color:var(--text-dim)">Licence Admin Panel</p>
    <div class="field"><label>Admin heslo</label><input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <div class="err" id="login-err"></div>
    <button class="btn-primary" onclick="doLogin()">Přihlásit se</button>
  </div>
</div>

<!-- NEW LICENCE MODAL -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <div class="modal-title"><span>Nová licence</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="new-key-result" class="hidden"></div>
    <div class="form-grid">
      <div class="field full"><label>Email</label><input type="email" id="f-email" placeholder="klient@firma.cz" /></div>
      <div class="field full"><label>Firma</label><input type="text" id="f-company" placeholder="Firma s.r.o." /></div>
      <div class="field"><label>Plán</label>
        <select id="f-plan" style="background:#f9f9f9;border:1.5px solid var(--border);border-radius:7px;padding:10px;font-family:var(--mono);font-size:12px;outline:none">
          <option value="trial">Trial (30 dní)</option>
          <option value="pro" selected>Pro</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>
      <div class="field"><label>Seats (PC)</label><input type="number" id="f-seats" value="1" min="1" max="50" /></div>
      <div class="field"><label>Platnost do</label><input type="date" id="f-valid" /></div>
      <div class="field full"><label>Poznámka</label><input type="text" id="f-notes" placeholder="Interní poznámka..." /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Zrušit</button>
      <button class="btn-pink" onclick="createLicense()">Vytvořit licenci</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- HEADER -->
<header>
  <div class="logo">iSupply <span>Scan</span></div>
  <div class="admin-badge">LICENCE ADMIN</div>
  <button class="btn-sm" onclick="doLogout()">Odhlásit</button>
</header>

<main>
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Celkem licencí</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)" id="s-active">—</div><div class="stat-lbl">Aktivní</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)" id="s-expired">—</div><div class="stat-lbl">Vypršelé</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--pink)" id="s-seats">—</div><div class="stat-lbl">Aktivních PC</div></div>
  </div>

  <div class="toolbar">
    <div class="section-title" style="flex:1">Licence</div>
    <button class="btn-pink" onclick="openModal()">+ Nová licence</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Licenční klíč</th><th>Firma</th><th>Email</th>
        <th>Plán</th><th>Seats</th><th>Platnost</th><th>Stav</th><th>Akce</th>
      </tr></thead>
      <tbody id="lic-tbody"></tbody>
    </table>
  </div>

  <div class="section-title">Audit log</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Čas</th><th>Licence</th><th>Akce</th><th>Detail</th><th>IP</th></tr></thead>
      <tbody id="log-tbody"></tbody>
    </table>
  </div>
</main>

<script>
const API = window.location.origin;
let adminPass = '';

async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type':'application/json', 'X-Admin-Password': adminPass } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

async function doLogin() {
  adminPass = document.getElementById('admin-pass').value;
  const r = await api('/api/admin/licenses');
  if (r.ok) {
    document.getElementById('login-screen').classList.add('hidden');
    load();
  } else {
    document.getElementById('login-err').textContent = 'Nesprávné heslo';
    adminPass = '';
  }
}

function doLogout() {
  adminPass = '';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('admin-pass').value = '';
}

function licStatus(l) {
  if (!l.active) return 'suspended';
  if (new Date(l.valid_until) < new Date()) return 'expired';
  return 'active';
}

const STATUS_LABELS = { active:'Aktivní', suspended:'Pozastaven', expired:'Vypršela' };

async function load() {
  const r = await api('/api/admin/licenses');
  if (!r.ok) return;
  const lics = r.licenses;

  document.getElementById('s-total').textContent   = lics.length;
  document.getElementById('s-active').textContent  = lics.filter(l=>licStatus(l)==='active').length;
  document.getElementById('s-expired').textContent = lics.filter(l=>licStatus(l)==='expired').length;
  document.getElementById('s-seats').textContent   = lics.reduce((a,l)=>a+(l.seats_used||0),0);

  document.getElementById('lic-tbody').innerHTML = lics.map(l => {
    const st = licStatus(l);
    const days = Math.ceil((new Date(l.valid_until)-new Date())/(1000*60*60*24));
    const validStr = st==='expired'
      ? `<span style="color:var(--red)">${l.valid_until}</span>`
      : days < 30
        ? `<span style="color:var(--yellow)">⚠ ${l.valid_until} (${days}d)</span>`
        : l.valid_until;
    return `<tr>
      <td><span class="key-display">${l.license_key}</span></td>
      <td style="font-weight:600">${l.company||'—'}</td>
      <td style="font-size:12px;color:var(--text-dim)">${l.email}</td>
      <td><span class="badge badge-${l.plan}">${l.plan}</span></td>
      <td style="font-family:var(--mono);font-size:12px">${l.seats_used||0}/${l.seats}</td>
      <td style="font-family:var(--mono);font-size:11px">${validStr}</td>
      <td><span class="badge badge-${st}">${STATUS_LABELS[st]}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn-sm" onclick="toggleActive(${l.id},${l.active})">${l.active?'Pozastavit':'Aktivovat'}</button>
        <button class="btn-sm" onclick="extendYear(${l.id},'${l.valid_until}')">+1 rok</button>
        <button class="btn-sm" onclick="viewActivations(${l.id})">PC (${l.seats_used||0})</button>
      </td>
    </tr>`;
  }).join('');

  // Load log
  const lr = await api('/api/admin/log');
  if (lr.ok) {
    document.getElementById('log-tbody').innerHTML = lr.log.slice(0,50).map(e => `<tr>
      <td style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${new Date(e.created_at).toLocaleString('cs-CZ')}</td>
      <td><span class="key-display" style="font-size:10px">${e.license_key}</span></td>
      <td><span class="badge badge-${e.action.includes('VALID')?'active':e.action.includes('EXPIRE')||e.action.includes('SUSPEND')?'suspended':'trial'}">${e.action}</span></td>
      <td style="font-size:12px">${e.detail||'—'}</td>
      <td style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${e.ip||'—'}</td>
    </tr>`).join('');
  }
}

async function toggleActive(id, active) {
  await api(`/api/admin/licenses/${id}`, 'PUT', { active: !active });
  toast(active ? '⚠ Licence pozastavena' : '✓ Licence aktivována');
  load();
}

async function extendYear(id, currentDate) {
  const d = new Date(currentDate);
  d.setFullYear(d.getFullYear() + 1);
  await api(`/api/admin/licenses/${id}`, 'PUT', { valid_until: d.toISOString().slice(0,10) });
  toast('✓ Prodlouženo o 1 rok');
  load();
}

async function viewActivations(lid) {
  const r = await api(`/api/admin/licenses/${lid}/activations`);
  if (!r.ok) return;
  const list = r.activations.map(a =>
    `• ${a.hostname||'?'} · aktivováno ${new Date(a.activated_at).toLocaleDateString('cs-CZ')} · naposledy ${new Date(a.last_seen).toLocaleDateString('cs-CZ')} [<a href="#" onclick="delActivation(${a.id},${lid});return false">odebrat</a>]`
  ).join('\n');
  alert(r.activations.length === 0 ? 'Žádná aktivovaná zařízení' : list);
}

async function delActivation(aid, lid) {
  await api(`/api/admin/activations/${aid}`, 'DELETE');
  toast('✓ Aktivace odebrána');
  viewActivations(lid);
}

function openModal() {
  document.getElementById('new-key-result').classList.add('hidden');
  document.getElementById('new-key-result').innerHTML = '';
  ['f-email','f-company','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-plan').value = 'pro';
  document.getElementById('f-seats').value = '1';
  const d = new Date(); d.setFullYear(d.getFullYear()+1);
  document.getElementById('f-valid').value = d.toISOString().slice(0,10);
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); load(); }

async function createLicense() {
  const r = await api('/api/admin/licenses', 'POST', {
    email:       document.getElementById('f-email').value,
    company:     document.getElementById('f-company').value,
    plan:        document.getElementById('f-plan').value,
    seats:       parseInt(document.getElementById('f-seats').value),
    valid_until: document.getElementById('f-valid').value,
    notes:       document.getElementById('f-notes').value,
  });
  if (r.ok) {
    const el = document.getElementById('new-key-result');
    el.classList.remove('hidden');
    el.innerHTML = `<div class="new-key-box">
      <div style="font-size:11px;font-family:var(--mono);color:var(--text-dim);letter-spacing:.1em">NOVÝ LICENČNÍ KLÍČ</div>
      <div class="new-key-val">${r.license_key}</div>
      <div class="new-key-hint">Zkopírujte a pošlete klientovi. Klíč se zobrazí jen jednou.</div>
    </div>`;
    toast('✓ Licence vytvořena: ' + r.license_key);
  } else {
    alert('Chyba: ' + r.error);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Košík | iSupply.cz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FB91D1;--pink-d:#F05CB6;--pink-tint:#FFF0FA;
  --ink:#0A0A0C;--gray:#6B6B75;--line:#E4E4EC;
  --bg:#FAFAFC;--disp:'Archivo',sans-serif;--mono:'Archivo',monospace;--r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--disp);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55}
a{color:inherit;text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}
button{font-family:var(--disp);cursor:pointer;border:none;background:none}
.site-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--line)}
.header-inner{display:flex;align-items:center;gap:28px;padding:14px 24px}
.brand{display:flex;align-items:center}
.header-nav{display:flex;gap:22px;flex:1;font-size:14.5px;font-weight:500;color:var(--gray)}
.header-nav a:hover{color:var(--ink)}
.header-right{display:flex;align-items:center;gap:10px}
.btn-outline{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:9px 18px;font-weight:600;font-size:14px;color:var(--ink);transition:border-color .14s}
.btn-outline:hover{border-color:var(--ink)}
.btn-solid{background:var(--ink);color:#fff;border-radius:8px;padding:9px 20px;font-weight:700;font-size:14px;transition:background .14s}
.btn-solid:hover{background:#24242C}
.cart-badge{background:var(--pink);color:var(--ink);border-radius:99px;font-size:11px;padding:1px 7px;font-weight:700}

.page-head{padding:36px 0 20px}
.page-head h1{font-size:30px;font-weight:800}
.crumbs{color:var(--gray);font-size:13.5px;margin-bottom:10px}
.crumbs a:hover{color:var(--ink)}

.cart-layout{display:grid;grid-template-columns:1fr 340px;gap:28px;padding-bottom:60px;align-items:start}
@media (max-width:860px){.cart-layout{grid-template-columns:1fr}}
/* RESPONZIVITA: nav se na úzkých oknech lámal a přetékal ven z obrazovky.
   Na pokladní stránce nav není potřeba — logo vede zpět na úvod. */
.header-nav a,.btn-outline{white-space:nowrap}
.cart-layout>*{min-width:0}
@media(max-width:900px){.header-nav{display:none}.header-inner{gap:12px}}
@media(max-width:480px){.header-right a[href="index.html#vykup"]{display:none}.header-inner{padding:12px 16px}.btn-outline{padding:9px 12px}}

.cart-items{display:flex;flex-direction:column;gap:14px}

/* Řádek košíku: pevná mřížka místo flexu — sloupce se tak drží zarovnané
   pod sebou i u položek s různě dlouhým názvem. */
.cart-item{
  background:#fff;border:1.5px solid var(--line);border-radius:var(--r);
  padding:16px 18px;
  display:grid;
  grid-template-columns:84px 1fr auto auto 32px;
  align-items:center;gap:16px;
  transition:border-color .14s,box-shadow .14s;
}
.cart-item:hover{border-color:#D8D8E2;box-shadow:0 6px 20px -14px rgba(10,10,12,.18)}

.ci-photo{
  width:84px;height:84px;border-radius:12px;
  background:#fff;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;font-size:30px;
}
.ci-photo img{width:100%;height:100%;object-fit:contain;padding:7px;mix-blend-mode:multiply}

.ci-info{min-width:0}
.ci-info h3{font-size:15.5px;font-weight:700;margin:0 0 4px;line-height:1.3}
.ci-info .meta{color:var(--gray);font-size:12.5px;font-family:var(--mono);line-height:1.5}

.ci-qty{
  display:flex;align-items:center;gap:2px;
  border:1.5px solid var(--line);border-radius:9px;padding:3px;
}
.ci-qty button{
  width:28px;height:28px;font-size:16px;font-weight:700;border-radius:6px;
  background:transparent;border:none;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;transition:background .12s;
}
.ci-qty button:hover{background:var(--bg)}
.ci-qty span{min-width:26px;text-align:center;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}

.ci-price{font-weight:800;font-size:16px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:96px}

.ci-remove{
  width:32px;height:32px;border:none;background:transparent;cursor:pointer;
  color:#B0B0BC;font-size:15px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;
}
.ci-remove:hover{background:#FEF2F2;color:#D92D20}

/* Na mobilu se řádek zalomí: fotka + název nahoře, počet a cena pod tím. */
@media(max-width:560px){
  .cart-item{
    grid-template-columns:72px 1fr 32px;
    grid-template-areas:"photo info remove" "photo qty price";
    row-gap:12px;padding:14px;
  }
  .ci-photo{grid-area:photo;width:72px;height:72px;align-self:start}
  .ci-info{grid-area:info}
  .ci-qty{grid-area:qty;justify-self:start}
  .ci-price{grid-area:price;justify-self:end;align-self:center;min-width:0}
  .ci-remove{grid-area:remove;align-self:start}
}

/* Prázdný košík: dřív zůstal v levém sloupci mřížky (vedle skrytého souhrnu),
   takže vypadal odsunutý doleva. Teď se mřížka přepne na jeden sloupec. */
.cart-layout.is-empty{grid-template-columns:minmax(0,1fr)}
.empty-cart{
  text-align:center;padding:70px 24px;max-width:520px;margin:0 auto;
  background:#fff;border:1.5px solid var(--line);border-radius:var(--r);
}
.empty-cart .emoji{font-size:52px;margin-bottom:16px;line-height:1}
.empty-cart h3{font-size:20px;margin-bottom:8px}
.empty-cart p{color:var(--gray);margin-bottom:24px;font-size:14.5px}

.summary-box{background:#fff;border:1.5px solid var(--line);border-radius:var(--r);padding:24px;position:sticky;top:90px;align-self:start}
.summary-box h3{font-size:16px;margin-bottom:16px}
.sum-row{display:flex;justify-content:space-between;gap:12px;font-size:14px;color:var(--gray);padding:7px 0;font-variant-numeric:tabular-nums}
.sum-row.total{color:var(--ink);font-weight:800;font-size:19px;border-top:1.5px solid var(--line);margin-top:10px;padding-top:14px}
.summary-box .btn-solid{width:100%;padding:14px;margin-top:16px;font-size:15px;text-align:center}
.summary-box .note{color:var(--gray);font-size:12.5px;text-align:center;margin-top:10px}

/* ===== MOBIL — nic nepřetéká, jednotné odsazení ===== */
html,body{overflow-x:hidden;width:100%;max-width:100%}
img{max-width:100%}
@media(max-width:640px){
  .wrap{padding:0 20px}
  .header-right{gap:6px;min-width:0}
  .btn-nav-outline,.btn-nav-solid{padding:8px 12px;font-size:13px}
}
@media(max-width:480px){
  .header-right a[href="#vykup"],.header-right a[href="index.html#vykup"]{display:none}
}
@media(max-width:400px){
  .wrap{padding:0 16px}
  .btn-nav-outline,.btn-nav-solid{padding:7px 10px;font-size:12.5px}
}
</style>
</head>

<div class="wrap page-head">
  <div class="crumbs"><a href="index.html">iSupply.cz</a> › <strong>Košík</strong></div>
  <h1>Košík</h1>
</div>

<div class="wrap cart-layout">
  <div class="cart-items" id="cart-items"></div>
  <div class="summary-box" id="summary-box" style="display:none">
    <h3>Souhrn objednávky</h3>
    <div class="sum-row"><span>Mezisoučet</span><span id="sum-subtotal">0 Kč</span></div>
    <div class="sum-row"><span>Doprava</span><span id="sum-shipping">Zdarma</span></div>
    <div class="sum-row total"><span>Celkem</span><span id="sum-total">0 Kč</span></div>
    <a href="platba.html"><button class="btn-solid">Pokračovat k platbě →</button></a>
    <div class="note">🔒 Zabezpečená platba · 🚚 Objednávka do 12:00, PPL doručí druhý den</div>
  </div>
</div>

<script src="cookies.js"></script>
<script src="chat.js"></script>
<script src="cart.js"></script>
<script>
const czk = n => n.toLocaleString("cs-CZ") + " Kč";

function render() {
  const items = Cart.getAll();
  const wrap = document.getElementById("cart-items");
  const summary = document.getElementById("summary-box");

  const layout = document.querySelector(".cart-layout");

  if (items.length === 0) {
    layout.classList.add("is-empty");     // jeden sloupec → prázdný košík je uprostřed
    wrap.innerHTML = `
      <div class="empty-cart">
        <div class="emoji">🛒</div>
        <h3>Košík je prázdný</h3>
        <p>Vyberte si zařízení a objeví se tady.</p>
        <a href="produkty.html"><button class="btn-solid" style="padding:13px 28px">Prohlédnout nabídku</button></a>
      </div>`;
    summary.style.display = "none";
    return;
  }

  layout.classList.remove("is-empty");
  summary.style.display = "";
  wrap.innerHTML = items.map((it, i) => `
    <div class="cart-item">
      <div class="ci-photo">${it.img ? `<img src="${it.img}" alt="${it.name}">` : "📦"}</div>
      <div class="ci-info">
        <h3>${it.name}</h3>
        <div class="meta">${[it.color, it.cap, it.stav !== "—" ? ("Stav " + it.stav) : null, it.battery ? "100% baterie" : null].filter(Boolean).join(" · ")}</div>
      </div>
      <div class="ci-qty">
        <button data-act="dec" data-i="${i}" aria-label="Ubrat">−</button>
        <span>${it.qty}</span>
        <button data-act="inc" data-i="${i}" aria-label="Přidat">+</button>
      </div>
      <div class="ci-price">${czk(it.price * it.qty)}</div>
      <button class="ci-remove" data-act="rm" data-i="${i}" aria-label="Odebrat z košíku">✕</button>
    </div>
  `).join("");

  document.getElementById("sum-subtotal").textContent = czk(Cart.total());
  document.getElementById("sum-total").textContent = czk(Cart.total());
}

document.getElementById("cart-items").addEventListener("click", e => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const i = +btn.dataset.i;
  const items = Cart.getAll();
  if (btn.dataset.act === "inc") Cart.setQty(i, items[i].qty + 1);
  if (btn.dataset.act === "dec") Cart.setQty(i, items[i].qty - 1);
  if (btn.dataset.act === "rm") Cart.removeAt(i);
  render();
});

render();
</script>
